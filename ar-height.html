<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AR Height Compare — LeBron</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: monospace; background: #111; color: #eee; height: 100dvh; overflow: hidden; display: flex; flex-direction: column; }

  #setup { padding: 2rem; display: flex; flex-direction: column; gap: 1rem; max-width: 400px; }
  #setup h2 { font-size: 1.1rem; }
  #setup p  { font-size: 0.85rem; color: #aaa; line-height: 1.5; }
  #setup label { font-size: 0.85rem; color: #aaa; display: block; margin-bottom: 0.25rem; }
  #setup input { background: #222; border: 1px solid #444; color: #eee; padding: 0.5rem; font-family: monospace; font-size: 1rem; width: 100%; }
  #setup button { background: #eee; color: #111; border: none; padding: 0.6rem 1rem; font-family: monospace; font-size: 1rem; cursor: pointer; width: 100%; }
  #setup button:hover { background: #ccc; }

  #ar { display: none; position: fixed; inset: 0; background: #000; }
  #ar.active { display: block; }
  #video { display: none; position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
  #ar.active #video { display: block; }
  #three-canvas { position: absolute; inset: 0; width: 100%; height: 100%; display: block; }

  #status { position: absolute; top: 8px; left: 8px; background: rgba(0,0,0,0.7); color: #eee; font-family: monospace; font-size: 0.75rem; padding: 4px 8px; pointer-events: none; max-width: 80%; line-height: 1.5; }
  #info   { position: absolute; bottom: 8px; left: 8px; right: 8px; background: rgba(0,0,0,0.7); color: #eee; font-family: monospace; font-size: 0.75rem; padding: 6px 8px; pointer-events: none; line-height: 1.7; }
  #back-btn    { position: absolute; top: 8px; right: 8px; background: rgba(0,0,0,0.7); color: #eee; border: 1px solid #555; font-family: monospace; font-size: 0.75rem; padding: 4px 10px; cursor: pointer; }
  #recalib-btn { position: absolute; top: 36px; right: 8px; background: rgba(0,0,0,0.7); color: #aaa; border: 1px solid #444; font-family: monospace; font-size: 0.7rem; padding: 4px 10px; cursor: pointer; display: none; }
  #recalib-btn.visible { display: block; }
</style>
</head>
<body>

<div id="setup">
  <h2>AR Height Compare</h2>
  <p>Compare your height against LeBron James (6'9" / 206 cm)</p>
  <div>
    <label>Your height (cm)</label>
    <input id="cm" type="number" placeholder="e.g. 178" min="100" max="250" value="178">
  </div>
  <button id="start-btn">Open Camera & Start</button>
  <small style="color:#555;font-size:0.75rem;">Stand 2–3 m from camera on a flat floor. Keep full body visible during calibration.</small>
</div>

<div id="ar">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="three-canvas"></canvas>
  <div id="status">Loading OpenCV…</div>
  <div id="info">—</div>
  <button id="back-btn">← back</button>
  <button id="recalib-btn">recalibrate</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>
<script async src="https://docs.opencv.org/4.8.0/opencv.js" onload="onCvReady()" onerror="onCvReady()"></script>

<script>
// ─── CONFIG ───────────────────────────────────────────────────────────────────
const PLAYER   = { name: 'LeBron James', heightCm: 206, color: 0x5c1a00 };
const VFOV_DEG = 60;
const VFOV_RAD = VFOV_DEG * Math.PI / 180;
const ROOM_W   = 8, ROOM_D = 8, ROOM_H = 3.5;
const N_CALIB  = 25;
const POSE_LOSS_MS = 2500;

// ─── STATE ────────────────────────────────────────────────────────────────────
let userHeightCm = 178;
let cvReady = false, pendingStart = false;

let scene, threeCamera, renderer, roomWireframe, playerGroup;
let phase = 'waiting';        // waiting → calib → done
let calibSamples = [];
let cameraPitchRad = null, cameraHeightM = null;
let smoothX = 0, smoothZ = -2.5;
let camW = 640, camH = 480, camAspect = 4 / 3;
let lastPoseTime = 0, poseLost = false;

// ─── OPENCV ───────────────────────────────────────────────────────────────────
function onCvReady() {
  cvReady = true;
  if (pendingStart) beginAR();
}

// ─── UI ───────────────────────────────────────────────────────────────────────
document.getElementById('start-btn').addEventListener('click', () => {
  userHeightCm = parseFloat(document.getElementById('cm').value) || 178;
  document.getElementById('setup').style.display = 'none';
  document.getElementById('ar').classList.add('active');
  if (cvReady) beginAR(); else { pendingStart = true; setStatus('Loading OpenCV…'); }
});

document.getElementById('back-btn').addEventListener('click',    () => location.reload());
document.getElementById('recalib-btn').addEventListener('click', resetCalibration);

function resetCalibration() {
  phase = 'calib'; calibSamples = []; cameraPitchRad = null; cameraHeightM = null;
  if (playerGroup)   playerGroup.visible   = false;
  if (roomWireframe) roomWireframe.visible = false;
  document.getElementById('recalib-btn').classList.remove('visible');
  document.getElementById('info').textContent = '—';
  setStatus('Recalibrating — stand still, full body visible…');
}

function beginAR() {
  pendingStart = false;
  initThree();
  initMediaPipe();
}

// ─── THREE.JS ─────────────────────────────────────────────────────────────────
function initThree() {
  const canvas = document.getElementById('three-canvas');
  renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setClearColor(0x000000, 0);

  scene = new THREE.Scene();

  threeCamera = new THREE.PerspectiveCamera(VFOV_DEG, window.innerWidth / window.innerHeight, 0.01, 50);
  threeCamera.position.set(0, 1.2, 0);
  threeCamera.rotation.order = 'YXZ';
  threeCamera.rotation.x = -0.25;

  scene.add(new THREE.AmbientLight(0xffffff, 0.55));
  const sun = new THREE.DirectionalLight(0xffffff, 1.0);
  sun.position.set(2, 5, 3);
  scene.add(sun);

  buildRoomWireframe();
  buildPlayerModel();

  window.addEventListener('resize', () => {
    renderer.setSize(window.innerWidth, window.innerHeight);
    threeCamera.aspect = window.innerWidth / window.innerHeight;
    threeCamera.updateProjectionMatrix();
  });

  animate();
}

function buildRoomWireframe() {
  const pos = [], col = [];
  const fc = new THREE.Color(0x00ffcc);
  const wc = new THREE.Color(0x44aaff);

  // Floor grid (XZ plane, y=0)
  for (let i = 0; i <= 12; i++) {
    const x = -ROOM_W/2 + (i/12)*ROOM_W;
    const a = 0.2 + 0.45*(1 - Math.abs(i/12 - 0.5)*2);
    pos.push(x,0,0, x,0,-ROOM_D);
    col.push(fc.r,fc.g,fc.b,a, fc.r,fc.g,fc.b,a*0.3);
  }
  for (let j = 0; j <= 12; j++) {
    const z = -(j/12)*ROOM_D, a = 0.12 + 0.55*(j/12);
    pos.push(-ROOM_W/2,0,z, ROOM_W/2,0,z);
    col.push(fc.r,fc.g,fc.b,a, fc.r,fc.g,fc.b,a);
  }

  // Back wall grid (XY plane at z=-ROOM_D)
  for (let i = 0; i <= 8; i++) {
    const x = -ROOM_W/2 + (i/8)*ROOM_W, a = (i===0||i===8) ? 0.55 : 0.18;
    pos.push(x,0,-ROOM_D, x,ROOM_H,-ROOM_D);
    col.push(wc.r,wc.g,wc.b,a, wc.r,wc.g,wc.b,a*0.4);
  }
  for (let j = 0; j <= 5; j++) {
    const y = (j/5)*ROOM_H, a = j===0 ? 0.55 : 0.15;
    pos.push(-ROOM_W/2,y,-ROOM_D, ROOM_W/2,y,-ROOM_D);
    col.push(wc.r,wc.g,wc.b,a, wc.r,wc.g,wc.b,a);
  }

  // Vertical corners and ceiling edges
  [[-ROOM_W/2,-ROOM_D],[ROOM_W/2,-ROOM_D],[-ROOM_W/2,0],[ROOM_W/2,0]].forEach(([x,z]) => {
    pos.push(x,0,z, x,ROOM_H,z);
    col.push(wc.r,wc.g,wc.b,0.45, wc.r,wc.g,wc.b,0.08);
  });
  [[-ROOM_W/2,ROOM_W/2,0,0],[-ROOM_W/2,ROOM_W/2,-ROOM_D,-ROOM_D],
   [-ROOM_W/2,-ROOM_W/2,0,-ROOM_D],[ROOM_W/2,ROOM_W/2,0,-ROOM_D]].forEach(([x1,x2,z1,z2]) => {
    pos.push(x1,ROOM_H,z1, x2,ROOM_H,z2);
    col.push(wc.r,wc.g,wc.b,0.18, wc.r,wc.g,wc.b,0.18);
  });

  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
  geo.setAttribute('color',    new THREE.Float32BufferAttribute(col, 4));
  roomWireframe = new THREE.LineSegments(geo, new THREE.LineBasicMaterial({ vertexColors: true, transparent: true, depthWrite: false }));
  roomWireframe.visible = false;
  scene.add(roomWireframe);
}

function buildPlayerModel() {
  playerGroup = new THREE.Group();
  playerGroup.visible = false;

  const c      = PLAYER.color;
  const jersey = new THREE.MeshLambertMaterial({ color: c });
  const skin   = new THREE.MeshLambertMaterial({ color: 0xc8874a });
  const shorts = new THREE.MeshLambertMaterial({ color: darken(c, 0.55) });
  const shoe   = new THREE.MeshLambertMaterial({ color: 0x111111 });
  const white  = new THREE.MeshLambertMaterial({ color: 0xffffff });

  function box(w, h, d, mat, x, y, z) {
    const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
    m.position.set(x, y, z);
    playerGroup.add(m);
    return m;
  }

  // Feet at y=0, head-top at y≈1.06 (measured)
  box(0.075,0.055,0.14, shoe,    0.05,  0.028, 0.01);  // R shoe
  box(0.075,0.055,0.14, shoe,   -0.05,  0.028, 0.01);  // L shoe
  box(0.065,0.22, 0.065,skin,    0.05,  0.17,  0);     // R lower leg
  box(0.065,0.22, 0.065,skin,   -0.05,  0.17,  0);     // L lower leg
  box(0.075,0.055,0.075,shorts,  0.05,  0.31,  0);     // R knee
  box(0.075,0.055,0.075,shorts, -0.05,  0.31,  0);     // L knee
  box(0.082,0.22, 0.082,shorts,  0.05,  0.44,  0);     // R thigh
  box(0.082,0.22, 0.082,shorts, -0.05,  0.44,  0);     // L thigh
  box(0.20, 0.30, 0.11, jersey,  0,     0.68,  0);     // torso
  box(0.065,0.22, 0.065,skin,    0.155, 0.68,  0);     // R upper arm
  box(0.065,0.22, 0.065,skin,   -0.155, 0.68,  0);     // L upper arm
  box(0.055,0.20, 0.055,skin,    0.158, 0.47,  0);     // R forearm
  box(0.055,0.20, 0.055,skin,   -0.158, 0.47,  0);     // L forearm
  box(0.05, 0.08, 0.04, skin,    0.158, 0.32,  0);     // R hand
  box(0.05, 0.08, 0.04, skin,   -0.158, 0.32,  0);     // L hand
  box(0.06, 0.07, 0.06, skin,    0,     0.855, 0);     // neck
  box(0.16, 0.17, 0.16, skin,    0,     0.975, 0);     // head
  box(0.17, 0.04, 0.17, white,   0,     0.99,  0);     // headband
  box(0.03, 0.025,0.01, shoe,    0.042, 0.978, 0.085); // R eye
  box(0.03, 0.025,0.01, shoe,   -0.042, 0.978, 0.085); // L eye

  playerGroup.userData.nativeHeight = 1.06;
  playerGroup.userData.animTime     = 0;

  const d = playerGroup.userData;
  d.rForearm  = playerGroup.children[11];
  d.lForearm  = playerGroup.children[12];
  d.rUpperArm = playerGroup.children[9];
  d.lUpperArm = playerGroup.children[10];
  [d.rForearm, d.lForearm, d.rUpperArm, d.lUpperArm].forEach(c => { c.userData.baseY = c.position.y; });

  scene.add(playerGroup);
}

function darken(hex, f) {
  return (Math.floor(((hex>>16)&0xff)*f)<<16) | (Math.floor(((hex>>8)&0xff)*f)<<8) | Math.floor((hex&0xff)*f);
}

// ─── MEDIAPIPE ────────────────────────────────────────────────────────────────
function initMediaPipe() {
  const video = document.getElementById('video');

  navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user', width: { ideal: 1280 }, height: { ideal: 720 } }, audio: false })
    .then(stream => {
      video.srcObject = stream;
      video.play();
      video.addEventListener('loadedmetadata', () => {
        camW = video.videoWidth || 640;
        camH = video.videoHeight || 480;
        camAspect = camW / camH;
        threeCamera.aspect = camAspect;
        threeCamera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
        phase = 'calib';
        setStatus('Calibrating — stand still, full body visible…');
      }, { once: true });
    })
    .catch(err => setStatus('Camera error: ' + err.message));

  const pose = new Pose({ locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${f}` });
  pose.setOptions({ modelComplexity: 1, smoothLandmarks: true, enableSegmentation: false, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });
  pose.onResults(r => {
    if (!r.poseLandmarks || !r.poseWorldLandmarks) return;
    lastPoseTime = performance.now();
    if (poseLost && phase === 'done') {
      poseLost = false;
      playerGroup.visible = roomWireframe.visible = true;
    }
    processPose(r.poseLandmarks, r.poseWorldLandmarks);
  });

  video.addEventListener('loadeddata', () => {
    const loop = async () => { if (video.readyState >= 2) await pose.send({ image: video }); requestAnimationFrame(loop); };
    loop();
  });
}

// ─── CAMERA POSE: OpenCV solvePnP ─────────────────────────────────────────────
// Supplies 9 well-distributed body landmarks as 3D world points (from
// poseWorldLandmarks, scaled to user's real height with feet at y=0)
// and their 2D image projections to solvePnP, recovering camera height
// and pitch without any hardcoded camera height assumption.
function solveCameraPose(lm2d, lmWorld) {
  if (!cvReady || typeof cv === 'undefined') return null;

  const IDX   = [0, 11, 12, 23, 24, 25, 26, 27, 28];
  const valid = IDX.filter(i => lm2d[i].visibility > 0.5);
  if (valid.length < 5) return null;

  const userHeightM = userHeightCm / 100;

  // Measure skeleton foot-to-nose span and scale to user's real height.
  // MediaPipe world y increases downward, so foot.y > nose.y numerically.
  const footWorldY = Math.max(lmWorld[27].y, lmWorld[28].y);
  const skeletonHeight = Math.abs(footWorldY - lmWorld[0].y) * 1.08; // +8% nose→head-top
  const scale = skeletonHeight > 0.1 ? userHeightM / skeletonHeight : 1.0;
  const floorY = footWorldY * scale; // world-y of floor after scaling

  const objPts = [], imgPts = [];
  for (const i of valid) {
    const w = lmWorld[i];
    objPts.push(w.x * scale, -w.y * scale + floorY, w.z * scale);
    imgPts.push((1 - lm2d[i].x) * camW, lm2d[i].y * camH); // mirror x
  }

  const objMat     = cv.matFromArray(valid.length, 3, cv.CV_64F, objPts);
  const imgMat     = cv.matFromArray(valid.length, 2, cv.CV_64F, imgPts);
  const fy         = (camH / 2) / Math.tan(VFOV_RAD / 2);
  const camMat     = cv.matFromArray(3, 3, cv.CV_64F, [fy, 0, camW/2, 0, fy, camH/2, 0, 0, 1]);
  const distCoeffs = cv.Mat.zeros(4, 1, cv.CV_64F);
  const rvec = new cv.Mat(), tvec = new cv.Mat();

  let result = null;
  try {
    if (cv.solvePnP(objMat, imgMat, camMat, distCoeffs, rvec, tvec, false, cv.SOLVEPNP_ITERATIVE)) {
      const R = new cv.Mat();
      cv.Rodrigues(rvec, R);
      const Rt = R.t();
      const t  = [tvec.data64F[0], tvec.data64F[1], tvec.data64F[2]];

      // Camera world position = -R^T * t
      const camY = -(Rt.data64F[3]*t[0] + Rt.data64F[4]*t[1] + Rt.data64F[5]*t[2]);
      const camZ = -(Rt.data64F[6]*t[0] + Rt.data64F[7]*t[1] + Rt.data64F[8]*t[2]);

      // Camera pitch: angle of look direction below horizontal
      // lookDir.y = R^T * [0,0,-1] → third component of second row negated
      const lookDirY = Rt.data64F[3]*0 + Rt.data64F[4]*0 + Rt.data64F[5]*(-1);
      const pitchRad = Math.asin(Math.max(-1, Math.min(1, lookDirY)));

      result = {
        camHeight: Math.max(0.2, Math.min(3.0, camY)),
        pitchRad:  Math.max(-0.1, Math.min(Math.PI/2, pitchRad)),
      };
      R.delete(); Rt.delete();
    }
  } catch(e) { /* degenerate input */ }

  objMat.delete(); imgMat.delete(); camMat.delete(); distCoeffs.delete(); rvec.delete(); tvec.delete();
  return result;
}

// ─── POSE PROCESSING ─────────────────────────────────────────────────────────
function processPose(lm, lmWorld) {
  if (phase === 'waiting') return;

  const lShoulder = lm[11], rShoulder = lm[12];
  const lAnkle = lm[27], rAnkle = lm[28], lFoot = lm[31], rFoot = lm[32];

  const footCands = [lAnkle, rAnkle, lFoot, rFoot].filter(l => l.visibility > 0.35);
  if (!footCands.length) { setStatus('Feet not visible — step back'); return; }
  const footNormY = Math.max(...footCands.map(l => l.y));
  const shoulderWidthNorm = Math.abs(lShoulder.x - rShoulder.x);

  // ── CALIBRATION ──────────────────────────────────────────────────────────
  if (phase === 'calib') {
    const pnp = solveCameraPose(lm, lmWorld);

    if (pnp) {
      calibSamples.push(pnp);
    } else {
      // Fallback: geometric estimate when OpenCV unavailable
      const nose = lm[0];
      const bodyNormH = footNormY - (nose.y - shoulderWidthNorm * 0.55);
      if (bodyNormH < 0.05) { setStatus('Stand further back'); return; }
      const dist  = (userHeightCm / 100) / Math.tan(Math.max(bodyNormH * VFOV_RAD, 0.05));
      const A     = (footNormY - 0.5) * VFOV_RAD;
      calibSamples.push({ camHeight: 1.2, pitchRad: A - Math.atan(1.2 / Math.max(dist, 0.1)) });
    }

    setStatus(`Calibrating ${calibSamples.length}/${N_CALIB} — stand still`);
    if (calibSamples.length < N_CALIB) return;

    // Variance check on camera height — reject if person was moving
    const heights  = calibSamples.map(s => s.camHeight);
    const mean     = heights.reduce((a,b) => a+b) / heights.length;
    const variance = heights.reduce((s,v) => s+(v-mean)**2, 0) / heights.length;
    if (variance > 0.05) {
      calibSamples = [];
      setStatus('Movement detected — hold still for calibration…');
      return;
    }

    const median = arr => { const s = [...arr].sort((a,b) => a-b); return s[Math.floor(s.length/2)]; };
    cameraHeightM  = median(heights);
    cameraPitchRad = median(calibSamples.map(s => s.pitchRad));

    threeCamera.position.set(0, cameraHeightM, 0);
    threeCamera.rotation.x = -cameraPitchRad;

    roomWireframe.visible = playerGroup.visible = true;
    document.getElementById('recalib-btn').classList.add('visible');
    phase = 'done';
    setStatus(`Calibrated ✓  camH: ${cameraHeightM.toFixed(2)}m  pitch: ${(cameraPitchRad*180/Math.PI).toFixed(1)}°`);
    return;
  }

  // ── TRACKING ─────────────────────────────────────────────────────────────

  // Distance: D = cameraHeight / tan(pitch + footAngle)
  const totalAngle = cameraPitchRad + (footNormY - 0.5) * VFOV_RAD;
  const distM = Math.max(0.5, Math.min(ROOM_D - 0.5,
    totalAngle > 0.01 ? cameraHeightM / Math.tan(totalAngle) : 2.5
  ));

  // Player scale: LeBron's real height / model native height
  playerGroup.scale.setScalar((PLAYER.heightCm / 100) / playerGroup.userData.nativeHeight);

  // Z: smooth to inferred distance
  smoothZ += (-distM * 0.9 - smoothZ) * 0.1;

  // X: place player just outside the person's right edge in world space.
  //
  // 1. Find the rightmost visible upper-body landmark in normalised screen X.
  //    We use shoulders, elbows, wrists and hips — whichever is furthest right.
  //    (MediaPipe x=0 is left edge, x=1 is right edge of frame; video is mirrored
  //    for display so screen-right = smaller normalised x.)
  const bodyEdgeCands = [lm[11],lm[12],lm[13],lm[14],lm[15],lm[16],lm[23],lm[24]]
    .filter(l => l.visibility > 0.4);
  // After mirror: screen-right corresponds to min normalised x
  const personRightNormX = bodyEdgeCands.length
    ? Math.min(...bodyEdgeCands.map(l => l.x))
    : (lShoulder.x < rShoulder.x ? lShoulder.x : rShoulder.x);

  // 2. Convert that screen x to world X at the player's depth.
  const hFovRad      = 2 * Math.atan(Math.tan(VFOV_RAD / 2) * threeCamera.aspect);
  const widthAtDepth = 2 * Math.abs(smoothZ) * Math.tan(hFovRad / 2);
  const personRightWorldX = -(personRightNormX - 0.5) * widthAtDepth; // mirrored

  // 3. Compute the person's half-body width in world space from shoulder span.
  //    We add one full body-width gap so there's clear separation.
  const personHalfWidthWorld = (shoulderWidthNorm * widthAtDepth) * 0.5;
  const gapWorld = personHalfWidthWorld * 1.5; // gap = 1.5× half-width

  // 4. Place player's centre just to the right of the person's right edge.
  //    Player's own half-width ≈ same shoulder proportion scaled by LeBron/user ratio.
  const playerHalfWidthWorld = personHalfWidthWorld * (PLAYER.heightCm / userHeightCm);
  const targetX = personRightWorldX + gapWorld + playerHalfWidthWorld;

  smoothX += (targetX - smoothX) * 0.12;

  playerGroup.position.set(smoothX, 0, smoothZ);

  const fmt = cm => `${Math.floor(cm/30.48)}'${Math.round((cm%30.48)/2.54)}" (${Math.round(cm)} cm)`;
  const diff = Math.abs(PLAYER.heightCm - userHeightCm);
  const dir  = PLAYER.heightCm > userHeightCm ? 'taller' : 'shorter';
  document.getElementById('info').textContent =
    `You: ${fmt(userHeightCm)}   LeBron: ${fmt(PLAYER.heightCm)}   diff: ${diff} cm ${dir}   camH: ${cameraHeightM.toFixed(2)}m   dist: ${distM.toFixed(1)}m`;
}

// ─── RENDER LOOP ──────────────────────────────────────────────────────────────
let lastNow = 0;
function animate(now = 0) {
  requestAnimationFrame(animate);
  const dt = Math.min((now - lastNow) / 1000, 0.05);
  lastNow = now;

  // Pose loss: reset calibration if person leaves frame
  if (phase === 'done' && !poseLost && lastPoseTime > 0 && performance.now() - lastPoseTime > POSE_LOSS_MS) {
    poseLost = true;
    playerGroup.visible = roomWireframe.visible = false;
    resetCalibration();
    setStatus('Person lost — recalibrating…');
  }

  // Idle animation
  if (playerGroup?.visible) {
    playerGroup.userData.animTime += dt;
    const t = playerGroup.userData.animTime;
    playerGroup.position.y = Math.sin(t * 1.4) * 0.004 * playerGroup.scale.y;
    const swing = Math.sin(t * 1.1) * 0.014;
    const d = playerGroup.userData;
    if (d.rForearm)  d.rForearm.position.y  = d.rForearm.userData.baseY  + swing;
    if (d.lForearm)  d.lForearm.position.y  = d.lForearm.userData.baseY  - swing;
    if (d.rUpperArm) d.rUpperArm.position.y = d.rUpperArm.userData.baseY + swing * 0.4;
    if (d.lUpperArm) d.lUpperArm.position.y = d.lUpperArm.userData.baseY - swing * 0.4;
  }

  renderer.render(scene, threeCamera);
}

function setStatus(msg) { document.getElementById('status').textContent = msg; }
</script>
</body>
</html>
