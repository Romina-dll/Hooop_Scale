<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AR Height Compare — LeBron</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: monospace;
    background: #111;
    color: #eee;
    height: 100dvh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  #setup {
    padding: 2rem;
    display: flex;
    flex-direction: column;
    gap: 1rem;
    max-width: 400px;
  }
  #setup h2 { font-size: 1.1rem; }
  #setup p  { font-size: 0.85rem; color: #aaa; line-height: 1.5; }
  #setup label { font-size: 0.85rem; color: #aaa; display: block; margin-bottom: 0.25rem; }
  #setup input {
    background: #222; border: 1px solid #444; color: #eee;
    padding: 0.5rem; font-family: monospace; font-size: 1rem; width: 100%;
  }
  .row { display: flex; gap: 0.5rem; }
  .row input { flex: 1; }
  #setup button {
    background: #eee; color: #111; border: none;
    padding: 0.6rem 1rem; font-family: monospace; font-size: 1rem;
    cursor: pointer; width: 100%;
  }
  #setup button:hover { background: #ccc; }

  #ar { display: none; position: fixed; inset: 0; background: #000; }
  #ar.active { display: block; }

  #video {
    display: none;
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    transform: scaleX(-1); /* mirror selfie cam */
  }
  #ar.active #video { display: block; }

  #three-canvas {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    display: block;
  }

  #status {
    position: absolute; top: 8px; left: 8px;
    background: rgba(0,0,0,0.65); color: #eee;
    font-family: monospace; font-size: 0.75rem;
    padding: 4px 8px; pointer-events: none;
    max-width: 75%; line-height: 1.5;
  }
  #info {
    position: absolute; bottom: 8px; left: 8px; right: 8px;
    background: rgba(0,0,0,0.65); color: #eee;
    font-family: monospace; font-size: 0.75rem;
    padding: 6px 8px; pointer-events: none; line-height: 1.7;
  }
  #back-btn {
    position: absolute; top: 8px; right: 8px;
    background: rgba(0,0,0,0.65); color: #eee;
    border: 1px solid #555; font-family: monospace;
    font-size: 0.75rem; padding: 4px 10px; cursor: pointer;
  }
  #recalib-btn {
    position: absolute; top: 36px; right: 8px;
    background: rgba(0,0,0,0.65); color: #aaa;
    border: 1px solid #444; font-family: monospace;
    font-size: 0.7rem; padding: 4px 10px; cursor: pointer; display: none;
  }
  #recalib-btn.visible { display: block; }
</style>
</head>
<body>

<div id="setup">
  <h2>AR Height Compare</h2>
  <p>Compare your height against LeBron James (6'9" / 206 cm)</p>
  <div>
    <label>Your height (cm)</label>
    <input id="cm" type="number" placeholder="e.g. 178" min="100" max="250" value="178">
  </div>
  <button id="start-btn">Open Camera & Start</button>
  <small style="color:#555;font-size:0.75rem;">
    Stand 2–3 m from camera on a flat floor. Keep full body visible during calibration.
  </small>
</div>

<div id="ar">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="three-canvas"></canvas>
  <div id="status">Starting…</div>
  <div id="info">—</div>
  <button id="back-btn">← back</button>
  <button id="recalib-btn">recalibrate</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>

<script>
// ─────────────────────────────────────────────────────────────────────────────
// APPROACH: Reconstruct a minimal 3D room from a single camera.
//
// The Three.js scene contains:
//   - A perspective camera pitched downward to match the real camera tilt
//   - A horizontal FLOOR plane at y=0 textured with the lower portion of
//     the video frame (UV-mapped so it appears to show the real floor)
//   - A vertical BACK WALL plane textured with the upper portion of the frame
//   - The 3D player model standing on the floor at y=0
//
// Camera pitch is inferred from the MediaPipe ankle landmarks:
//   The ankle's normalised Y in the video frame tells us how far below the
//   horizon the camera is looking. Combined with the known camera FOV and the
//   assumption that ankles are at y=0 in the real world, we solve for pitch.
//
// Scene scale:
//   During calibration we establish metres-per-pixel using the user's known
//   height, then place the player at the correct real-world scale.
//
// UV split:
//   The video frame is split at the horizon line into floor and wall regions.
//   Each surface UV-maps to its own strip of the video texture so the full
//   image is reconstructed across both planes without any distortion seam
//   (the seam sits right at the horizon which the player occludes anyway).
// ─────────────────────────────────────────────────────────────────────────────

const PLAYER   = { name: "LeBron James", heightCm: 206, color: 0x5c1a00 };
const VFOV_DEG = 60;   // assumed vertical FOV — good for most webcams
const VFOV_RAD = VFOV_DEG * Math.PI / 180;

// ─── STATE ────────────────────────────────────────────────────────────────────
let userHeightCm = 178;
let scene, threeCamera, renderer;
let videoTexture;
let floorMesh, wallMesh, floorGridMesh;
let playerGroup;

// Calibration — single phase that solves for camHeight + pitch simultaneously
let phase        = 'calib';
let calibSamples = [];
const N_CALIB    = 30;

let cameraPitchRad = null;  // downward tilt below horizontal (positive = looking down)
let cameraHeightM  = null;  // solved real camera height above floor in metres
let horizonNormY   = null;  // normalised Y of horizon line in video frame [0..1]

// Smooth player X
let smoothPlayerX = 0;
let smoothPlayerZ = -2.5;    // depth in scene (metres in front of back wall)

let camAspect = 16 / 9;
const POSE_LOSS_MS = 2500;
let lastPoseTime = 0;
let poseLost = false;

// ─── UI ───────────────────────────────────────────────────────────────────────
document.getElementById('start-btn').addEventListener('click', () => {
  userHeightCm = parseFloat(document.getElementById('cm').value) || 178;

  document.getElementById('setup').style.display = 'none';
  document.getElementById('ar').classList.add('active');
  initThree();
  initMediaPipe();
});

document.getElementById('back-btn').addEventListener('click', () => location.reload());
document.getElementById('recalib-btn').addEventListener('click', resetCalibration);

function resetCalibration() {
  phase          = 'calib';
  calibSamples   = [];
  cameraPitchRad = null;
  cameraHeightM  = null;
  horizonNormY   = null;
  if (playerGroup)    playerGroup.visible    = false;
  if (roomWireframe)  roomWireframe.visible  = false;
  document.getElementById('recalib-btn').classList.remove('visible');
  document.getElementById('info').textContent = '—';
  setStatus('Recalibrating — stand still, full body visible…');
}

// ─── THREE INIT ───────────────────────────────────────────────────────────────
function initThree() {
  const canvas = document.getElementById('three-canvas');
  const W = window.innerWidth, H = window.innerHeight;

  renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.setSize(W, H);
  renderer.setClearColor(0x000000, 0); // fully transparent background

  scene = new THREE.Scene(); // no background — video shows through canvas

  // Three.js camera: height and pitch set after calibration
  threeCamera = new THREE.PerspectiveCamera(VFOV_DEG, W / H, 0.01, 50);
  threeCamera.position.set(0, 1.2, 0); // placeholder height, overridden after calib
  threeCamera.rotation.order = 'YXZ';
  threeCamera.rotation.x = -0.3;       // placeholder tilt, overridden after calib

  // No video texture needed — video is a plain HTML element behind the canvas

  // Lighting — ambient + directional so solid player model gets shading
  scene.add(new THREE.AmbientLight(0xffffff, 0.55));
  const sun = new THREE.DirectionalLight(0xffffff, 1.0);
  sun.position.set(2, 5, 3);
  scene.add(sun);

  // Build room wireframe (hidden until calibrated)
  buildRoomWireframe();

  buildPlayerModel();

  window.addEventListener('resize', () => {
    const W2 = window.innerWidth, H2 = window.innerHeight;
    renderer.setSize(W2, H2);
    threeCamera.aspect = W2 / H2;
    threeCamera.updateProjectionMatrix();
  });

  animate();
}

const ROOM_WIDTH  = 8;
const ROOM_DEPTH  = 8;
const WALL_HEIGHT = 3.5;

// Room wireframe: floor grid + back wall outline + vertical corner lines
// Called once after calibration with the solved room dimensions.
// All lines are semi-transparent so they overlay the video without obscuring it.
let roomWireframe = null;

function buildRoomWireframe() {
  if (roomWireframe) { scene.remove(roomWireframe); roomWireframe = null; }

  const positions = [];
  const colArray  = [];

  const floorCol = new THREE.Color(0x00ffcc);
  const wallCol  = new THREE.Color(0x44aaff);

  // ── FLOOR GRID (XZ plane at y=0) ──
  const FX = ROOM_WIDTH, FZ = ROOM_DEPTH;
  const XSTEPS = 12, ZSTEPS = 12;

  for (let i = 0; i <= XSTEPS; i++) {
    const x = -FX / 2 + (i / XSTEPS) * FX;
    const a = 0.2 + 0.45 * (1 - Math.abs(i / XSTEPS - 0.5) * 2);
    positions.push(x, 0, 0,   x, 0, -FZ);
    colArray.push(floorCol.r, floorCol.g, floorCol.b, a,
                  floorCol.r, floorCol.g, floorCol.b, a * 0.3);
  }
  for (let j = 0; j <= ZSTEPS; j++) {
    const z = -(j / ZSTEPS) * FZ;
    const a = 0.15 + 0.55 * (j / ZSTEPS);
    positions.push(-FX / 2, 0, z,   FX / 2, 0, z);
    colArray.push(floorCol.r, floorCol.g, floorCol.b, a,
                  floorCol.r, floorCol.g, floorCol.b, a);
  }

  // ── BACK WALL GRID (XY plane at z=-ROOM_DEPTH) ──
  const WX = ROOM_WIDTH, WY = WALL_HEIGHT;
  const WXSTEPS = 8, HYSTEPS = 5;

  for (let i = 0; i <= WXSTEPS; i++) {
    const x = -WX / 2 + (i / WXSTEPS) * WX;
    const a = i === 0 || i === WXSTEPS ? 0.6 : 0.2;
    positions.push(x, 0, -FZ,   x, WY, -FZ);
    colArray.push(wallCol.r, wallCol.g, wallCol.b, a,
                  wallCol.r, wallCol.g, wallCol.b, a * 0.4);
  }
  for (let j = 0; j <= HYSTEPS; j++) {
    const y = (j / HYSTEPS) * WY;
    const a = j === 0 ? 0.6 : 0.18;
    positions.push(-WX / 2, y, -FZ,   WX / 2, y, -FZ);
    colArray.push(wallCol.r, wallCol.g, wallCol.b, a,
                  wallCol.r, wallCol.g, wallCol.b, a);
  }

  // ── VERTICAL CORNER LINES (connect floor edges to wall top) ──
  const corners = [[-FX/2, -FZ], [FX/2, -FZ], [-FX/2, 0], [FX/2, 0]];
  corners.forEach(([x, z]) => {
    positions.push(x, 0, z,   x, WY, z);
    colArray.push(wallCol.r, wallCol.g, wallCol.b, 0.5,
                  wallCol.r, wallCol.g, wallCol.b, 0.1);
  });

  // ── CEILING EDGE ──
  positions.push(-FX/2, WY, 0,   FX/2, WY, 0);
  colArray.push(wallCol.r, wallCol.g, wallCol.b, 0.15,
                wallCol.r, wallCol.g, wallCol.b, 0.15);
  positions.push(-FX/2, WY, 0,   -FX/2, WY, -FZ);
  colArray.push(wallCol.r, wallCol.g, wallCol.b, 0.15,
                wallCol.r, wallCol.g, wallCol.b, 0.3);
  positions.push(FX/2, WY, 0,   FX/2, WY, -FZ);
  colArray.push(wallCol.r, wallCol.g, wallCol.b, 0.15,
                wallCol.r, wallCol.g, wallCol.b, 0.3);
  positions.push(-FX/2, WY, -FZ,   FX/2, WY, -FZ);
  colArray.push(wallCol.r, wallCol.g, wallCol.b, 0.3,
                wallCol.r, wallCol.g, wallCol.b, 0.3);

  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
  geo.setAttribute('color',    new THREE.Float32BufferAttribute(colArray,  4));

  roomWireframe = new THREE.LineSegments(geo, new THREE.LineBasicMaterial({
    vertexColors: true, transparent: true, depthWrite: false,
  }));
  roomWireframe.visible = false;
  scene.add(roomWireframe);
}

// ─── PLAYER MODEL (solid) ─────────────────────────────────────────────────────
function buildPlayerModel() {
  if (playerGroup) scene.remove(playerGroup);
  playerGroup = new THREE.Group();
  playerGroup.visible = false;

  const c      = PLAYER.color;
  const jersey = new THREE.MeshLambertMaterial({ color: c });
  const skin   = new THREE.MeshLambertMaterial({ color: 0xc8874a });
  const shorts = new THREE.MeshLambertMaterial({ color: darken(c, 0.55) });
  const shoe   = new THREE.MeshLambertMaterial({ color: 0x111111 });
  const white  = new THREE.MeshLambertMaterial({ color: 0xffffff });

  function box(w, h, d, mat, x, y, z) {
    const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
    m.position.set(x, y, z);
    m.castShadow = true;
    playerGroup.add(m);
    return m;
  }

  // Feet at y=0, head-top at y≈1.09
  box(0.075, 0.055, 0.14, shoe,    0.05,   0.028, 0.01);   // R shoe
  box(0.075, 0.055, 0.14, shoe,   -0.05,   0.028, 0.01);   // L shoe
  box(0.065, 0.22,  0.065,skin,    0.05,   0.17,  0);      // R lower leg
  box(0.065, 0.22,  0.065,skin,   -0.05,   0.17,  0);      // L lower leg
  box(0.075, 0.055, 0.075,shorts,  0.05,   0.31,  0);      // R knee
  box(0.075, 0.055, 0.075,shorts, -0.05,   0.31,  0);      // L knee
  box(0.082, 0.22,  0.082,shorts,  0.05,   0.44,  0);      // R thigh
  box(0.082, 0.22,  0.082,shorts, -0.05,   0.44,  0);      // L thigh
  box(0.20,  0.30,  0.11, jersey,  0,      0.68,  0);      // torso
  box(0.065, 0.22,  0.065,skin,    0.155,  0.68,  0);      // R upper arm
  box(0.065, 0.22,  0.065,skin,   -0.155,  0.68,  0);      // L upper arm
  box(0.055, 0.20,  0.055,skin,    0.158,  0.47,  0);      // R forearm
  box(0.055, 0.20,  0.055,skin,   -0.158,  0.47,  0);      // L forearm
  box(0.05,  0.08,  0.04, skin,    0.158,  0.32,  0);      // R hand
  box(0.05,  0.08,  0.04, skin,   -0.158,  0.32,  0);      // L hand
  box(0.06,  0.07,  0.06, skin,    0,      0.855, 0);      // neck
  box(0.16,  0.17,  0.16, skin,    0,      0.975, 0);      // head
  box(0.17,  0.04,  0.17, white,   0,      0.99,  0);      // headband
  box(0.03,  0.025, 0.01, shoe,    0.042,  0.978, 0.085);  // R eye
  box(0.03,  0.025, 0.01, shoe,   -0.042,  0.978, 0.085);  // L eye

  playerGroup.userData.nativeHeight = 1.09;
  playerGroup.userData.animTime     = 0;

  const d = playerGroup.userData;
  d.rForearm  = playerGroup.children[11];
  d.lForearm  = playerGroup.children[12];
  d.rUpperArm = playerGroup.children[9];
  d.lUpperArm = playerGroup.children[10];
  [d.rForearm, d.lForearm, d.rUpperArm, d.lUpperArm].forEach(
    c => { c.userData.baseY = c.position.y; }
  );

  scene.add(playerGroup);
}

function darken(hex, f) {
  return (Math.floor(((hex >> 16) & 0xff) * f) << 16) |
         (Math.floor(((hex >> 8)  & 0xff) * f) << 8)  |
          Math.floor(( hex        & 0xff) * f);
}

// ─── MEDIAPIPE ────────────────────────────────────────────────────────────────
function initMediaPipe() {
  const video = document.getElementById('video');

  navigator.mediaDevices.getUserMedia({
    video: { facingMode: 'user', width: { ideal: 1280 }, height: { ideal: 720 } },
    audio: false
  }).then(stream => {
    video.srcObject = stream;
    video.play();
    video.addEventListener('loadedmetadata', () => {
      if (video.videoWidth && video.videoHeight) {
        camAspect = video.videoWidth / video.videoHeight;
        threeCamera.aspect = camAspect;
        threeCamera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      }
    }, { once: true });
    setStatus('Camera on — stand with full body visible…');
  }).catch(err => setStatus('Camera error: ' + err.message));

  const pose = new Pose({
    locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${f}`
  });
  pose.setOptions({
    modelComplexity: 1, smoothLandmarks: true,
    enableSegmentation: false,
    minDetectionConfidence: 0.5, minTrackingConfidence: 0.5,
  });
  pose.onResults(r => {
    if (!r.poseLandmarks) { setStatus('No pose — full body must be visible'); return; }
    lastPoseTime = performance.now();
    if (poseLost && phase === 'done') {
      poseLost = false;
      if (playerGroup)   playerGroup.visible   = true;
      if (floorGridMesh) floorGridMesh.visible = true;
    }
    processPose(r.poseLandmarks);
  });

  video.addEventListener('loadeddata', () => {
    const loop = async () => {
      if (video.readyState >= 2) await pose.send({ image: video });
      requestAnimationFrame(loop);
    };
    loop();
  });
}

// ─── CAMERA GEOMETRY SOLVER ──────────────────────────────────────────────────
//
// We have TWO unknowns: camera height H and distance to person D.
// We have TWO equations from the pose:
//
//   (1) Feet are on the floor (real y=0). The angle of the feet below the
//       camera's horizontal is:
//         tan(pitch + θ_foot) = H / D
//       where θ_foot = (footNormY - 0.5) * VFOV_RAD  (angle from optical axis)
//
//   (2) Head top is at real y = userHeightM above the floor. The angle of the
//       head below (or above) the camera's horizontal is:
//         tan(pitch + θ_head) = (H - userHeightM) / D
//       where θ_head = (headTopNormY - 0.5) * VFOV_RAD
//
// Dividing (1) by (2) eliminates D:
//   tan(pitch + θ_foot) / tan(pitch + θ_head) = H / (H - userHeightM)
//
// Let:
//   A = θ_foot  (angle from axis to feet, positive = below)
//   B = θ_head  (angle from axis to head, positive = below — usually negative)
//   P = camera pitch (positive = looking down)
//   R = H / (H - userHeightM)   (ratio, always > 1 if camera above head)
//
// Then:  tan(P + A) / tan(P + B) = R
//   →    tan(P + A) = R * tan(P + B)
//   →    tan(P + A) - R * tan(P + B) = 0
//
// We solve this numerically (Newton's method / bisection) for P,
// then back-substitute to get H and D:
//   H = userHeightM * tan(P+A) / (tan(P+A) - tan(P+B))
//   D = H / tan(P+A)

function solveCamera(footNormY, headTopNormY) {
  const userHeightM = userHeightCm / 100;
  const A = (footNormY    - 0.5) * VFOV_RAD;  // angle to feet from axis
  const B = (headTopNormY - 0.5) * VFOV_RAD;  // angle to head from axis (negative = above axis)

  // f(P) = tan(P+A) - R*tan(P+B)  where R = H/(H-userHeightM)
  // We don't know R yet — but R cancels if we substitute:
  // tan(P+A)/tan(P+B) = H/(H-userHeightM)
  // Let's define f(P) = tan(P+A)*(H-userHeightM) - tan(P+B)*H = 0
  // After substitution with H = userHeightM*tan(P+A)/(tan(P+A)-tan(P+B)):
  // This reduces to finding P such that:
  //   tan(P+A) - tan(P+B) > 0  (camera must be above head)
  // and the ratio gives a physically plausible H > 0 and D > 0.

  // We directly solve: given two rays from camera to feet (floor) and head,
  // find pitch P such that the geometry is consistent.
  //
  // From (1): H = D * tan(P + A)
  // From (2): H - userHeightM = D * tan(P + B)
  // Subtracting: userHeightM = D * (tan(P+A) - tan(P+B))
  // → D = userHeightM / (tan(P+A) - tan(P+B))
  // → H = D * tan(P+A) = userHeightM * tan(P+A) / (tan(P+A) - tan(P+B))
  //
  // For this to be physically valid:
  //   tan(P+A) - tan(P+B) > 0  → P+A > P+B → A > B (always true: feet below head)
  //   H > 0  → tan(P+A) > 0  → P + A > 0  → P > -A
  //   D > 0  → same condition
  //
  // The equation is now fully determined for any P — we just need to find the P
  // that is also consistent with the camera being AT the right position to see
  // the foot at footNormY.
  //
  // Check: foot appears at footNormY which gives angle (footNormY-0.5)*VFOV_RAD from axis.
  // That angle from axis = (pitch + angle_below_horizontal_to_foot) - pitch
  //   where angle_below_horizontal_to_foot = atan(H/D)
  // So: (footNormY - 0.5)*VFOV_RAD = atan(H/D) - P
  // → atan(H/D) = P + A  ✓  (this is already equation (1), so it's always satisfied)
  //
  // The system is UNDERDETERMINED for P alone — any P gives a valid (H, D) pair.
  // We need one more constraint. The natural one is: the foot is visible at
  // footNormY in the frame. We already used that. The head at headTopNormY.
  // We already used that too. So the system is fully constrained — we just solve
  // the two-equation system directly:
  //
  //   D = userHeightM / (tan(P+A) - tan(P+B))
  //   H = D * tan(P+A)
  //
  // But P is still free! The issue is that we have 2 equations and 3 unknowns
  // (P, H, D). We need one more constraint.
  //
  // THE MISSING CONSTRAINT:
  // The foot appears at footNormY. In the camera model:
  //   footNormY = 0.5 + (P + atan(H/D)) / VFOV_RAD
  // But atan(H/D) = P + A by definition of A, so:
  //   footNormY = 0.5 + (P + P + A) / VFOV_RAD  ← this is wrong
  //
  // Let's be more careful. In the pinhole camera:
  //   angle_from_axis_to_foot = atan(H/D) - P   [for camera tilted down by P]
  //   footNormY = 0.5 + angle_from_axis_to_foot / VFOV_RAD
  //   → A = atan(H/D) - P
  //   → atan(H/D) = P + A  → H/D = tan(P+A)  ✓ same as before
  //
  // So we truly have 2 equations, 3 unknowns. The 3rd constraint comes from
  // the SCALE: the body occupies bodyNormH of the frame.
  //
  // bodyNormH = (footNormY - headTopNormY) = fraction of vertical FOV
  // Subtended angle = bodyNormH * VFOV_RAD
  // Real angle subtended by person = atan(userHeightM / D_approx)  [small angle approx]
  //   where D_approx ≈ horizontal distance (≈ D for small pitch)
  //
  // More precisely: the angle between the two rays (to feet and to head) is:
  //   (A - B) = (footNormY - headTopNormY) * VFOV_RAD  ← this is just A-B by definition
  //
  // The actual angle between the two rays from the camera to feet and head:
  //   Δα = atan(H/D) - atan((H-userHeightM)/D)
  //      = A + P - B - P = A - B  ✓
  //
  // So A - B = atan(H/D) - atan((H-userHeightM)/D)
  // This is always satisfied by any (H, D) from our two-equation solution above
  // — meaning we truly are underdetermined.
  //
  // RESOLUTION: We need one fixed assumption. We'll assume we know the camera pitch
  // approximately from the observation that a typical camera setup is roughly
  // horizontal to slightly downward-tilted (0° to 30°). We use a BISECTION search:
  // try pitches from -5° to 60° and pick the one that gives the most plausible
  // H (between 0.3m and 2.5m, i.e. camera on floor to above head).
  //
  // Actually — we CAN fully solve this with a third equation if we know the
  // camera's aspect ratio and the horizontal position of landmarks! The foot's
  // horizontal screen position combined with its Z depth gives us absolute X,
  // but that still doesn't constrain pitch independently.
  //
  // PRACTICAL SOLUTION:
  // We solve for (H, D) as a function of P, then find the P that puts H in
  // a physically plausible range AND minimises the residual of a soft prior
  // that the camera is likely between 0.5m and 2.0m high. We weight the
  // solution toward the centre of that range when the problem is ambiguous.

  // Bisect over pitch P in range [-10°, 70°]
  const P_MIN = -10 * Math.PI / 180;
  const P_MAX =  70 * Math.PI / 180;
  const STEPS = 200;

  let bestP = 0, bestH = 1.2, bestD = 2.0, bestScore = Infinity;

  for (let i = 0; i <= STEPS; i++) {
    const P = P_MIN + (i / STEPS) * (P_MAX - P_MIN);
    const tanA = Math.tan(P + A);
    const tanB = Math.tan(P + B);
    const denom = tanA - tanB;
    if (denom <= 0.001) continue;  // degenerate

    const D = userHeightM / denom;
    const H = D * tanA;

    if (H < 0.2 || H > 3.0 || D < 0.3 || D > 15) continue;

    // Score: soft prior — camera height near 1.0–1.5m is most common,
    // penalise extremes. Also penalise very far or very close distances.
    const hPrior = Math.pow(H - 1.2, 2) * 0.5;   // prefer ~1.2m height
    const dPrior = Math.pow(Math.log(D / 2.5), 2) * 0.1; // prefer ~2.5m distance
    const score  = hPrior + dPrior;

    if (score < bestScore) {
      bestScore = score;
      bestP = P; bestH = H; bestD = D;
    }
  }

  // Horizon: where the floor plane (y=0, infinite distance) projects
  // At infinite distance, the ray to the floor is horizontal → angle from axis = -P
  const hNormY = 0.5 + (-bestP) / VFOV_RAD;  // wait: horizon at angle -P from axis
  // Actually horizon is where a horizontal ray hits the image:
  // A horizontal ray has angle 0 below horizontal. Camera is pitched down by bestP.
  // In camera coordinates that ray is at angle -bestP from optical axis (above axis).
  // normY = 0.5 + (-bestP) / VFOV_RAD  → if pitched down, horizon is above centre
  const horizonY = Math.max(0.05, Math.min(0.95, 0.5 - bestP / VFOV_RAD));

  return {
    pitchRad:     bestP,
    cameraHeight: bestH,
    distMetres:   bestD,
    horizonNormY: horizonY,
  };
}

// ─── POSE PROCESSING ─────────────────────────────────────────────────────────
function processPose(lm) {
  const nose      = lm[0];
  const lShoulder = lm[11], rShoulder = lm[12];
  const lAnkle    = lm[27], rAnkle    = lm[28];
  const lFoot     = lm[31], rFoot     = lm[32];

  const footCands = [lAnkle, rAnkle, lFoot, rFoot].filter(l => l.visibility > 0.35);
  if (!footCands.length) { setStatus('Feet not visible — step back'); return; }
  const footNormY = Math.max(...footCands.map(l => l.y));

  const shoulderWidthNorm = Math.abs(lShoulder.x - rShoulder.x);
  const headTopNormY      = nose.y - shoulderWidthNorm * 0.55;
  const bodyNormH         = footNormY - headTopNormY;

  if (bodyNormH < 0.05) { setStatus('Stand further back — full body needed'); return; }

  // ── CALIBRATION PHASE ────────────────────────────────────────────────────
  if (phase === 'calib') {
    const result = solveCamera(footNormY, headTopNormY);
    calibSamples.push(result);
    setStatus(`Calibrating ${calibSamples.length}/${N_CALIB} — stand still, full body visible`);

    if (calibSamples.length < N_CALIB) return;

    // Variance check on horizon Y
    const hYs      = calibSamples.map(s => s.horizonNormY);
    const mean     = hYs.reduce((a, b) => a + b) / hYs.length;
    const variance = hYs.reduce((s, v) => s + (v - mean) ** 2, 0) / hYs.length;

    if (variance > 0.002) {
      calibSamples = [];
      setStatus('Movement detected — hold still for calibration…');
      return;
    }

    // Median of each quantity for robustness
    const median = arr => {
      const s = [...arr].sort((a, b) => a - b);
      return s[Math.floor(s.length / 2)];
    };

    cameraPitchRad = median(calibSamples.map(s => s.pitchRad));
    cameraHeightM  = median(calibSamples.map(s => s.cameraHeight));
    horizonNormY   = median(hYs);

    // Apply to Three.js camera
    threeCamera.position.set(0, cameraHeightM, 0);
    threeCamera.rotation.x = -cameraPitchRad;

    if (roomWireframe) roomWireframe.visible = true;
    playerGroup.visible = true;
    document.getElementById('recalib-btn').classList.add('visible');
    phase = 'done';
    setStatus(
      `Calibrated ✓  camH: ${cameraHeightM.toFixed(2)}m  ` +
      `pitch: ${(cameraPitchRad * 180 / Math.PI).toFixed(1)}°  ` +
      `horizon: ${horizonNormY.toFixed(3)}`
    );
    return;
  }

  // ── TRACKING PHASE ───────────────────────────────────────────────────────
  const result     = solveCamera(footNormY, headTopNormY);
  const distM      = result.distMetres;

  // Player scale: LeBron in real metres / model native metres
  const scale = (PLAYER.heightCm / 100) / playerGroup.userData.nativeHeight;
  playerGroup.scale.setScalar(scale);

  // Z: place player at inferred distance (clamped to room)
  const targetZ = -Math.max(0.5, Math.min(ROOM_DEPTH - 0.5, distM * 0.9));
  smoothPlayerZ += (targetZ - smoothPlayerZ) * 0.1;

  // X: foot midpoint in normalised frame → world X at that depth
  const hFovRad      = 2 * Math.atan(Math.tan(VFOV_RAD / 2) * threeCamera.aspect);
  const widthAtDepth = 2 * Math.abs(smoothPlayerZ) * Math.tan(hFovRad / 2);
  const footMidNormX = ((lAnkle.visibility > 0.3 ? lAnkle.x : 0.5) +
                        (rAnkle.visibility > 0.3 ? rAnkle.x : 0.5)) / 2;
  const rawX    = -(footMidNormX - 0.5) * widthAtDepth; // invert for selfie mirror
  const offsetX = shoulderWidthNorm * widthAtDepth * 1.2;
  const targetX = rawX + offsetX;
  smoothPlayerX += (targetX - smoothPlayerX) * 0.12;

  // Y: feet on floor
  playerGroup.position.set(smoothPlayerX, 0, smoothPlayerZ);

  // Info
  const fmt = cm => {
    const f = Math.floor(cm / 30.48);
    const i = Math.round((cm % 30.48) / 2.54);
    return `${f}'${i}" (${Math.round(cm)} cm)`;
  };
  const diff = Math.abs(PLAYER.heightCm - userHeightCm);
  const dir  = PLAYER.heightCm > userHeightCm ? 'taller' : 'shorter';
  document.getElementById('info').textContent =
    `You: ${fmt(userHeightCm)}   LeBron: ${fmt(PLAYER.heightCm)}   ` +
    `diff: ${diff} cm ${dir}   camH: ${cameraHeightM.toFixed(2)}m   dist: ${distM.toFixed(1)}m`;
}

// ─── ANIMATE ──────────────────────────────────────────────────────────────────
let lastNow = 0;
function animate(now = 0) {
  requestAnimationFrame(animate);
  const dt = Math.min((now - lastNow) / 1000, 0.05);
  lastNow = now;

  // Pose loss timeout
  if (phase === 'done' && !poseLost && lastPoseTime > 0) {
    if (performance.now() - lastPoseTime > POSE_LOSS_MS) {
      poseLost = true;
      if (playerGroup)   playerGroup.visible   = false;
      if (roomWireframe) roomWireframe.visible  = false;
      resetCalibration();
      setStatus('Person lost — step back into frame to recalibrate');
    }
  }

  // Idle animation
  if (playerGroup && playerGroup.visible) {
    playerGroup.userData.animTime += dt;
    const t = playerGroup.userData.animTime;

    // Breathing bob — feet stay on floor (y=0)
    playerGroup.position.y = Math.sin(t * 1.4) * 0.004 * playerGroup.scale.y;

    // Arm swing
    const swing = Math.sin(t * 1.1) * 0.014;
    const d = playerGroup.userData;
    if (d.rForearm)  d.rForearm.position.y  = d.rForearm.userData.baseY  + swing;
    if (d.lForearm)  d.lForearm.position.y  = d.lForearm.userData.baseY  - swing;
    if (d.rUpperArm) d.rUpperArm.position.y = d.rUpperArm.userData.baseY + swing * 0.4;
    if (d.lUpperArm) d.lUpperArm.position.y = d.lUpperArm.userData.baseY - swing * 0.4;
  }

  renderer.render(scene, threeCamera);
}

function setStatus(msg) { document.getElementById('status').textContent = msg; }
</script>
</body>
